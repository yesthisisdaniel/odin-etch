<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>The Odin Project etch-a-sketch project</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="pageTitle">
      <h1>Etch-a-Sketch!</h1>
    </div>
    <div id="mainContainer">
      <div id=buttonSidebar>
        <div class="buttonRow" id="gridButtonRow">
          <button id ="gridButton">Click me to input what size grid you want to make!</button>
        </div>
        <div class="buttonRow">
          <button id="blackColor" class="colorOptionButton">Choose me to draw in black!</button>
          <button id="darkeningColor" class="colorOptionButton">Choose me to draw with a "darkening effect"!</button>
          <button id="rainbowColor" class="colorOptionButton" class>Choose me to draw in a rainbow!</button>
          <button id="clearButton">Clear & reset grid</button>
        </div>
        <div id="eraserButtonRow" class="buttonRow">
          <button id="eraserButton">Eraser</button>
        </div>
      </div>
      
      <div id="gridContainer"></div>
    </div>
  
  
    <script src="script.js"></script>
  </body>
</html>
